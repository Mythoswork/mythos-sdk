[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "fastapi[standard]>=0.115.0",
    "httpx>=0.27.0",
]

[project]
name = "mythos-sdk"
version = "0.1.0"
description = "Official Mythos SDK for Python — launch token verification, usage reporting, and handshake"
readme = "README.md"
license = "LicenseRef-Proprietary"
requires-python = ">=3.11"
dependencies = [
    "python-jose[cryptography]>=3.3.0,<4",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "fastapi[standard]>=0.115.0",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/Mythoswork/mythos-sdk"
Repository = "https://github.com/Mythoswork/mythos-sdk"
Documentation = "https://github.com/Mythoswork/mythos-sdk#readme"

[tool.hatch.build.targets.wheel]
packages = ["mythos_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"

[[tool.mypy.overrides]]
module = ["jose.*"]
ignore_missing_imports = true

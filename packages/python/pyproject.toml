[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "fastapi[standard]>=0.100.0",
    "httpx>=0.27.0",
]

[project]
name = "mythos-sdk"
version = "0.1.0"
description = "Official Mythos SDK for Python — launch token verification, usage reporting, and handshake"
requires-python = ">=3.11"
dependencies = [
    "python-jose[cryptography]>=3.3.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "fastapi[standard]>=0.100.0",
    "httpx>=0.27.0",
]

[project]
name = "mythos-sdk"
version = "0.0.5"
description = "Official Mythos SDK for Python — launch token verification, usage reporting, and handshake"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = [
    "python-jose[cryptography]>=3.3.0,<4",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/Mythoswork/mythos-sdk"
Repository = "https://github.com/Mythoswork/mythos-sdk"

[project.optional-dependencies]
fastapi = ["fastapi>=0.100.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "cryptography>=42.0",
    "fastapi[standard]>=0.100.0",
    "httpx>=0.27.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"

[[tool.mypy.overrides]]
# python-jose ships no type stubs and types-python-jose is incomplete/unmaintained.
module = ["jose.*"]
ignore_missing_imports = true
